<!DOCTYPE html>
<html lang="en">
    <head>
    <title>bootstrap example</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js">

    </script>
    </head>
    <body>
        <div class="contatiner">
            <h2>carousel example</h2>
            <div id="mycarousel" class="carousel slide" data-ride="carousel">
                <ol class="carousel-indicators">
                    <li data-target="#mycarousel" data-slide-to="0" class="active"></li>
                    <li data-target="#mycarousel" data-slide-to="1"></li>
                    <li data-target="#mycarousel" data-slide-to="2"></li>
                </ol>
                <div class="carousel-inner">
                    <div class="item active">
                        <img src="pic" alt="img 1">
                    </div>

                    <div class="item">
                        <img src="pic2" alt="lmg 2">
                    </div>

                    <div class="item">
                        <img src="pic3" alt="penguin">
                    </div>

                    <a class="left carousel-control" href="" data-slide="previous"
                    <spam class="glyphicon glyphicon-chevron-left"></spam>
                    <spam class="sr-only">previous</spam>
                </a>

                <a class="right carousel-control" href="" data-slide="previous" <spam class="glyphicon glyphicon-chevron-right"></spam>
                    <spam class="sr-only">previous</spam>
                </a>
</div>
</div>
    </body>
</html>
