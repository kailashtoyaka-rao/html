<html>
    <head>
        <title>My Planet Cards</title>
        <style>
            body {
                font-family: Arial;
                background: #f0f4ff;
                padding: 30px;
                text-align: center;
            }
            h1 { color: #ff5a43; }
            p { color: #555; }
            .cards {
                display: flex;
                justify-content: center;
                gap: 20px;
                margin-top: 25px;
            }
            .planet-name {
                font-size: 22px;
                font-weight: bold;
                color: #333;
            }
            .planet-fact { color: #666; margin-top: 10px; font-size: 14px; }
            button {
                background: #ff5a43;
                color: white;
                border: none;
                padding: 12px 28px;
                border-radius: 8px;
                cursor: pointer;
                font-size: 16px;
                margin-top: 10px;
            }
        </style>
    </head>
    <body>
    <h1>My Planet Cards</h1>
    <P>Use a javascript class to built planet cards</P>
    <button onclick="showPlanets()">showPlanetnames</button>
    <div class="cards">
        <div id="card1"></div>
        <div id="card2"></div>
        <div id="card3"></div>
    </div>
    <script>
        class Planet {
            constructor(name, fact) {
                this.name = name;
                this.fact = fact;
            }
            describe() {
                return this.nmae + ": " + this.fact;
            }
        }
        function showPlanets() {
            let p1 = new Planet("earth", "the only planet with life");
            let p2 = new Planet("mars", "known as the red planet");
        let p3 = new Planet("saturn", "made of ice rings");

        document.getElementById("card1").innerHTML = 
        "<div class='card'><div class='planet-name'>" + p1.name +"</div>" +
        "<div class='planet-fact'>" + p1.describe() + "</div></div>"
        
        document.getElementById("card2").innerHTML =
                "<div class='card'><div class='planet-name'>" + p2.name + "</div>" +
                "<div class='planet-fact'>" + p2.describe() + "</div></div>"
        

                document.getElementById("card3").innerHTML =
                "<div class='card'><div class='planet-name'>" + p3.name + "</div>" +
                "<div class='planet-fact'>" + p3.describe() + "</div></div>"
                
        }
    </script>
    </body>
</html>
