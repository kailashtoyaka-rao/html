<!DOCTYPE html>
<html>
    <body>
        <h2>javascript Array Methods</h2>
        <h2>join() and pop()</h2>
        <P>the join() method joins elements into a string and the pop() method removes the last element from an arrays.</P>
        <p id="myjoin"></p>
        <p id="myfirstpop"></p>
        <p id="mysecondpop"></p>
        <script>
            var fruits = ["banana", "orange", "apple", "mango"];
            document.getElementById("myjoin").innerHTML = fruits.join(" * ");
            document.getElementById("myfirstpop").innerHTML = fruits;
            fruits.pop();
            document.getElementById("mysecondpop").innerHTML = fruits;
        </script>
    </body>
</html>
