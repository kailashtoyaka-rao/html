<!DOCTYPE html>
<html>
    <head>
        <title>MY ZOO</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background: aliceblue;
                text-align: center;
                padding: 30px;
            }
            h1 {
                color: #ff5a43;
            }

            #zoo {
                border: 2px solid #ff5a43;
                width: 300px;
                margin: 16px auto;
                padding: 12px;
                border-radius: 10px;
                background: white;
            }
             
            .zone {
                border: 1px solid #ff5a43;
                margin: 6px 0;
                padding: 8px 12px;
                border-radius: 6px;
                text-align: left;
            }

            button {
                background-color: #ff5a43;
                color: white;
                padding: 10px 24px;
                border: none;
                border-radius: 20px;
                cursor: pointer;
            }

        </style>
    </head>
    <body>

        <h1>my zoo</h1>
        <p>use javascript and the dom to add animals to each cage!!</p>

        <div id="zoo">
            <div class="zone">zone 1; <spam id="zone1"></spam></div>
            <div class="zone">zone 2; <spam id="zone2"></spam></div>
            <div class="zone">zone 3; <spam id="zone3"></spam></div>
            <div class="zone">total animals; <spam id="total"></spam></div>
        </div>

        <br>

        <button onclick="openzoo()">open the zoo</button>

        <p id="zoo-status"></p>

        <script>

function openzoo() {
    document.getElementById("zone1").innerHTML = "lion";
    document.getElementById("zone2").innerHTML = "elephant";
    document.getElementById("zone3").innerHTML = "penguin";
    document.getElementById("total").innerHTML = "3";
    document.getElementById("zoo").style.background = "lightgreen";
    document.getElementById("zoo-status").innerHTML = document.title + " is now open!";
}
        </script>
    </body>
</html>
