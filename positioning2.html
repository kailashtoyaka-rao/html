<!DOCTYPE html>

<html>

<head>

    <title>SportZone – Activity 2</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f4ff;
            padding: 20px;
            min-height: 1800px;
        }

        h1 {
            color: #1d4ed8;
            text-align: center;
            margin-top: 65px;
        }

        h2 {
            color: #1d4ed8;
            margin-top: 30px;
        }

        p {
            color: #555;
            margin-bottom: 10px;
        }

        .score-bar {

            position: fixed;

            top: 0;
            left: 0;
            right: 0;

            background: #1d4ed8;

            color: white;

            padding: 14px 20px;

            font-size: 16px;

            font-weight: bold;

            text-align: center;

        }

        .player-wrapper {
            position: relative;
            display: inline-block;
            margin-top: 15px;
        }

        .player-card {

            background: white;

            border: 2px solid #bfdbfe;

            padding: 20px 30px;

            text-align: center;

            font-size: 15px;

            border-radius: 10px;

        }

        .winner-badge {

            position: absolute;

            top: -12px;
            right: -12px;

            background: #f59e0b;

            color: white;

            padding: 5px 10px;

            font-size: 12px;

            font-weight: bold;

            border-radius: 20px;

        }

        .league-label {

            position: sticky;

            top: 52px;

            background: #1d4ed8;

            color: white;

            padding: 10px 20px;

            font-weight: bold;

            margin: 20px 0 10px;

        }

        .player-item {

            background: white;

            border: 2px solid #bfdbfe;

            padding: 10px 20px;

            margin: 8px 0;

            width: 220px;

            border-radius: 8px;

        }
    </style>

</head>

<body>
