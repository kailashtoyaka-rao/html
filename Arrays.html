<!DOCTYPE html>
<html>
    <body>
        <h2>javascript functions</h2>
        <p>do a calcaltion and they display the results</p>
        <p id="demo"></p>
        <script>
            function add(a, b) {

                return a + b;
        } 

        function average(a, b){
            return add(a, b) / 2;
        }
        var results = average (11, 22) 
        document.getElementById("demo").innerHTML = results;
        </script>
    </body>
</html>
